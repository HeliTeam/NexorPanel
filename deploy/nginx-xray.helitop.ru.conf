# Example nginx reverse proxy for Nexor panel + subscription path.
# TLS: use certbot (certonly --nginx) or configure ssl_certificate paths manually.

upstream nexor_panel {
    server 127.0.0.1:2053;
}

server {
    listen 443 ssl http2;
    server_name xray.helitop.ru;

    # ssl_certificate     /etc/letsencrypt/live/xray.helitop.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/xray.helitop.ru/privkey.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass https://nexor_panel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Subscription URLs: https://xray.helitop.ru/sub/{uuid}
    # If the sub server listens on a different port, add a second upstream and location.
}

server {
    listen 80;
    server_name xray.helitop.ru;
    return 301 https://$host$request_uri;
}
